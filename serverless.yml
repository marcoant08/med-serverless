service: med-leve

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}

plugins:
  - serverless-dotenv-plugin
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    exclude:
      - aws-sdk

functions:
  getAgendas:
    handler: src/presentation/handlers/get-agendas.handler
    events:
      - http:
          path: /agendas
          method: get

  createAgendamento:
    handler: src/presentation/handlers/create-agendamento.handler
    events:
      - http:
          path: /agendamento
          method: post

  triagem:
    handler: src/presentation/handlers/triagem.handler
    environment:
      OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    events:
      - http:
          path: /triagem
          method: post

  notFound:
    handler: src/presentation/handlers/not-found.handler
    events:
      - http:
          path: /{proxy+}
          method: any
